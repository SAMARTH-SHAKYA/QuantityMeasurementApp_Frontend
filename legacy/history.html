<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Quantity Measurement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .history-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
            flex: 1;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }
        .history-header h2 {
            font-size: 1.5rem;
            color: var(--primary-blue);
        }
        .back-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: var(--transition-fast);
            text-decoration: none;
        }
        .back-btn:hover {
            background: var(--bg-color);
            color: var(--text-dark);
        }
        /* Table Styles */
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            background-color: var(--bg-color);
            padding: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
        }
        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-dark);
            font-size: 0.95rem;
            vertical-align: middle;
        }
        tr:hover {
            background-color: #f8faff;
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #e2e8f0;
            color: #4a5568;
        }
        .badge.length { background: #e6fffa; color: #285e61; }
        .badge.weight { background: #fffaf0; color: #9c4221; }
        .badge.temperature { background: #fff5f5; color: #9b2c2c; }
        .badge.volume { background: #ebf8ff; color: #2a4365; }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header class="app-header">
        <h1>Quantity Measurement History</h1>
        <div class="header-actions">
            <button id="logout-btn" class="nav-btn secondary">Logout</button>
        </div>
    </header>

    <main class="history-container">
        <div class="glass-panel">
            <div class="history-header">
                <h2>Past Operations</h2>
                <a href="index.html" class="back-btn">← Back to Dashboard</a>
            </div>
            
            <div id="error-message" class="result-message error hidden"></div>
            
            <div class="table-container">
                <table id="history-table" class="hidden">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Action</th>
                            <th>Value 1</th>
                            <th>Value 2</th>
                            <th>Result</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Populated dynamically -->
                    </tbody>
                </table>
            </div>
            
            <div id="loading" class="loading">Loading history...</div>
            <div id="empty-state" class="empty-state hidden">No measurement history found. Go make some!</div>
        </div>
    </main>

    <script type="module" src="js/history.js"></script>
</body>
</html>
