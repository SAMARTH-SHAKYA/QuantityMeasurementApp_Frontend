<div class="auth-split-container">
    <!-- Left Side: Branding / Illustration area -->
    <div class="auth-branding">
        <div class="brand-content">
            <div class="brand-logo">Q</div>
            <h1 class="brand-title">Join Quantity <br> Measurement</h1>
            <p class="brand-subtitle">Unlock powerful unit conversions, real-time comparisons, and arithmetic operations.</p>
        </div>
        
        <!-- Background decorative elements for the orange side -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Right Side: Clean Form -->
    <div class="auth-form-wrapper">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="auth-instruction">Start measuring smarter, securely.</p>
            
            <div class="social-login-container">
                <asl-google-signin-button type="standard" size="large" [width]="300"></asl-google-signin-button>
            </div>

            <div class="auth-divider">
                <span>OR</span>
            </div>

            <form (ngSubmit)="onSubmit()">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" required placeholder="Choose a username" [(ngModel)]="username" name="username">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" required placeholder="Enter your email" [(ngModel)]="email" name="email">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required placeholder="Create a password" [(ngModel)]="password" name="password">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" required placeholder="Confirm your password" [(ngModel)]="confirmPassword" name="confirmPassword">
                </div>
                
                <div id="auth-message" class="result-message" [class.hidden]="!message" [class.success]="isSuccess" [class.error]="!isSuccess">
                    {{ message }}
                </div>
                
                <button type="submit" class="primary-btn auth-btn" [disabled]="isLoading">
                    {{ isLoading ? 'Registering...' : 'Create Account' }}
                </button>
            </form>
            
            <a routerLink="/login" class="auth-link">Already a member? <strong>Login here</strong></a>
        </div>
    </div>
</div>
