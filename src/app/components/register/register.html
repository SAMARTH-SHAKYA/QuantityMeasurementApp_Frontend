<div class="auth-container">
    <div class="glass-panel auth-card">
        <h2>Create Account</h2>
        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" class="form-input" required placeholder="Choose a username" [(ngModel)]="username" name="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" required placeholder="Enter your email" [(ngModel)]="email" name="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" required placeholder="Create a password" [(ngModel)]="password" name="password">
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-input" required placeholder="Confirm your password" [(ngModel)]="confirmPassword" name="confirmPassword">
            </div>
            <div id="auth-message" class="result-message" [class.hidden]="!message" [class.success]="isSuccess" [class.error]="!isSuccess">{{ message }}</div>
            <button type="submit" class="primary-btn auth-btn" [disabled]="isLoading">{{ isLoading ? 'Registering...' : 'Register' }}</button>
        </form>
        <a routerLink="/login" class="auth-link">Already have an account? <strong>Login here</strong></a>
    </div>
</div>
