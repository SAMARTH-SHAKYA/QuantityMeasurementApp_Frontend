<div class="app-layout">
    <header class="stylish-navbar">
        <div class="logo-area" (click)="goToDashboard()">
            <div class="logo-icon">Q</div>
            <span class="logo-text">Quantity <span class="highlight">Measure</span></span>
        </div>
        
        <div class="nav-actions">
            <button (click)="goToHistory()" class="nav-btn ghost-btn">
                <span class="icon">📋</span> <span class="hide-mobile">History</span>
            </button>
            
            <ng-container *ngIf="authService.getToken(); else noAuth">
                <button (click)="logout()" class="nav-btn outline-btn">
                    <span class="btn-text">Logout</span>
                </button>
            </ng-container>
            <ng-template #noAuth>
                <button (click)="goToLogin()" class="nav-btn primary-btn">
                    <span class="btn-text">Login</span>
                </button>
            </ng-template>
        </div>
    </header>

    <main class="main-content">
        <router-outlet></router-outlet>
    </main>
</div>
