<header class="app-header">
    <h1 (click)="goToDashboard()" style="cursor: pointer;">Welcome To Quantity Measurement</h1>
    <div class="header-actions">
        <ng-container *ngIf="authService.getToken(); else noAuth">
            <button (click)="goToHistory()" class="nav-btn">History</button>
            <button (click)="logout()" class="nav-btn secondary">Logout</button>
        </ng-container>
        <ng-template #noAuth>
            <button (click)="goToLogin()" class="nav-btn">Login / Register</button>
        </ng-template>
    </div>
</header>
<router-outlet></router-outlet>
